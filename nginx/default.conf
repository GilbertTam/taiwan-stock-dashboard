# ================================
# Nginx Server Configuration
# ================================

# Frontend route
upstream frontend {
    server frontend:3000;
}

# 如果前端起在本機（非這個docker-compose）
# 路由則要改成host.docker.internal
#upstream frontend {
#    server host.docker.internal:3080;
#}

# Backend route
upstream backend {
    server backend-api:8000;
}

map $http_upgrade $connection_upgrade {
    # 這邊是設定websocket的header
    default upgrade;
    '' close;
}

proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=my_cache:10m max_size=10g inactive=60m use_temp_path=off;

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /src;

    server_name front-end;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    server_tokens off;
    client_max_body_size 10m;


    # =============================
    # Front-end route
    # =============================

    # Next.js static files
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_cache my_cache;
        proxy_cache_use_stale error timeout http_500 http_502 http_503 http_504;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Next.js service worker
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
    }

    # Health check
    location /health {
        access_log off;
        return 200 'OK';
    }

    # ============================
    # Back-end route
    # ============================
    # OAuth (Google / Microsoft) — needs a looser limiter than the strict
    # /api/auth bucket (5r/m, burst=3). The OAuth redirect dance has several
    # roundtrips that can collide with concurrent dashboard asset loads.
    # nginx longest-prefix match makes this win over /api/auth.
    location /api/auth/oauth {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://backend;
        proxy_buffering off;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_connect_timeout      10s;
        proxy_send_timeout         60s;
        proxy_read_timeout         60s;
    }

    # Stricter rate limit for auth endpoints (password login, token, register).
    # The strict bucket here naturally throttles brute-force attempts.
    # NOTE: hydration deliberately lives at /api/account/me (under the looser
    # /api block) since it's called on every app mount and OAuth bridge.
    location /api/auth {
        limit_req zone=auth_limit burst=3 nodelay;
        proxy_pass http://backend;
        proxy_buffering off;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_connect_timeout      10s;
        proxy_send_timeout         60s;
        proxy_read_timeout         60s;
    }

    location /api {
        limit_req zone=api_limit burst=60 nodelay;
        proxy_pass http://backend;
        proxy_buffering off;
        proxy_redirect off;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Port $forwarded_port;
        proxy_set_header X-Forwarded-Proto $forwarded_scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $http_host;
        proxy_connect_timeout      10s;
        proxy_send_timeout         60s;
        proxy_read_timeout         60s;
    }

    # back-end websocket
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_connect_timeout      10s;
        proxy_send_timeout         60s;
        proxy_read_timeout         60s;
    }

    # 50x.html 在 nginx:alpine 沒附,直接內聯回 JSON 讓前端看得到 5XX
    # (原本 root html 找不到 /etc/nginx/html/50x.html 會再翻一次成 404 把 backend 真實錯誤遮掉)
    error_page 500 502 503 504 = @api_error;
    location @api_error {
        default_type application/json;
        return 502 '{"error":"upstream_error","detail":"backend timed out or crashed; check container logs"}';
    }

}


#user  nobody;
worker_processes  auto;

#error_log  logs/error.log;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  2048;
}


http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;

    #keepalive_timeout  0;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml image/webp application/wasm font/woff2;
    gzip_min_length 1024;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # Honor an upstream-supplied X-Forwarded-Proto (Cloudflare, outer
    # load balancer, etc.) so we don't overwrite "https" with this
    # nginx's own $scheme — which is always "http" because this server
    # block only listens on port 80 inside docker. Falls back to $scheme
    # when no upstream proxy is in the chain.
    map $http_x_forwarded_proto $forwarded_scheme {
        default $scheme;
        "https" "https";
        "http"  "http";
    }

    # Same idea for the public port — without this the backend learns the
    # docker-internal port 80 instead of the real 443.
    map $http_x_forwarded_port $forwarded_port {
        default $server_port;
        ~^\d+$  $http_x_forwarded_port;
    }

    include /etc/nginx/conf.d/default.conf;
}

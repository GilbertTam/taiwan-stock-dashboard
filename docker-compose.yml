x-common-networks: &networks
  networks:
    - net

x-common-restart: &restart
  restart: always

x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-env: &env-file
  env_file:
    - ./.env

services:

  frontend:
    <<: [ *restart, *networks ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-frontend
    depends_on:
      - backend-api

  backend-redis:
    <<: [ *restart, *networks ]
    image: redis
    container_name: ${PROJECT_NAME}-redis
    hostname: ${PROJECT_NAME}-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m

  backend-api:
    <<: [ *restart, *networks, *env-file ]
    container_name: ${PROJECT_NAME}-api
    hostname: ${PROJECT_NAME}-api
    image: ${PROJECT_NAME}-backend:latest
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    volumes:
      - ./backend:/app
    command: bash docker-entrypoint.sh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY:-secret-key}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - P_MAX_CH=${P_MAX_CH}
      - P_MAX_DIS=${P_MAX_DIS}
      - E_CAP=${E_CAP}
      - SOC_MIN_PCT=${SOC_MIN_PCT}
      - SOC_MAX_PCT=${SOC_MAX_PCT}
      - COST_CYCLE=${COST_CYCLE}
      - MIN_BID=${MIN_BID}
      # ES Indices
      - ES_INDEX_PREDICTION=${ES_INDEX_PREDICTION:-prediction}
      - ES_INDEX_JEPX=${ES_INDEX_JEPX:-jepx_spot_area_price}
      - ES_INDEX_JEPX_SYSTEM=${ES_INDEX_JEPX_SYSTEM:-jepx_spot_system}
      - ES_INDEX_IMBALANCE=${ES_INDEX_IMBALANCE:-imbalance}
      - ES_INDEX_HJKS=${ES_INDEX_HJKS:-hjks_outage}
      - ES_INDEX_INTERCONNECTION=${ES_INDEX_INTERCONNECTION:-occto_inter}
      - ES_INDEX_INTRADAY=${ES_INDEX_INTRADAY:-jepx_intraday}
      - ES_INDEX_EARTHQUAKE=${ES_INDEX_EARTHQUAKE:-jma_earthquake_actual}
      - ES_INDEX_OCCTO_AREA=${ES_INDEX_OCCTO_AREA:-occto_area}
      - ES_INDEX_OCCTO_INTER=${ES_INDEX_OCCTO_INTER:-occto_inter}
      - ES_INDEX_OCCTO_EVENT=${ES_INDEX_OCCTO_EVENT:-occto_event}
      - ES_INDEX_TDGC=${ES_INDEX_TDGC:-tdgc}
      - ES_INDEX_WEATHER_ACTUAL_HOURLY=${ES_INDEX_WEATHER_ACTUAL_HOURLY:-weather_actual_hourly}
      - ES_INDEX_WEATHER_ACTUAL_DAILY=${ES_INDEX_WEATHER_ACTUAL_DAILY:-weather_actual_daily}
      - ES_INDEX_WEATHER_FORECAST_HOURLY=${ES_INDEX_WEATHER_FORECAST_HOURLY:-weather_forecast_hourly}
      - ES_INDEX_WEATHER_FORECAST_DAILY=${ES_INDEX_WEATHER_FORECAST_DAILY:-weather_forecast_daily}

  backend-nginx:
    <<: [ *restart, *networks, *extra-hosts ]
    container_name: ${PROJECT_NAME}-nginx
    image: nginx:1.27-alpine
    hostname: ${PROJECT_NAME}-nginx
    depends_on:
      frontend:
        condition: service_started
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    ports:
      - "${PROJECT_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/src

networks:
  net:
    name: ${PROJECT_NAME}-net
    driver: bridge

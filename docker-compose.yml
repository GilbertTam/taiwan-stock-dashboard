
x-common-networks:
  &networks
  networks:
    - net

x-common-restart:
  &restart
  restart: always

x-extra-hosts:
  &extra-hosts
  extra_hosts: # 若前端頁面爲前端自己建立的server則必須設定這項去讓nginx可以接同一臺機器的其他port
    - "host.docker.internal:host-gateway"

x-env:
  &env-file
  env_file: 
    - ./.env

services:

  frontend:
    <<: [ *restart, *networks ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend-api:8000
    depends_on:
      - backend-api

  backend-postgres:
    <<: [ *restart, *networks ]
    container_name: ${PROJECT_NAME}-postgres
    hostname: ${PROJECT_NAME}-postgres
    image: postgres:latest
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_USER_PASSWORD}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - ./backend-db-data:/var/lib/postgresql/data

  backend-redis:
    <<: [ *restart, *networks ]
    image: redis
    container_name: ${PROJECT_NAME}-redis
    hostname: ${PROJECT_NAME}-redis

  backend-api:
    <<: [ *restart, *networks ]
    container_name: ${PROJECT_NAME}-api
    hostname: ${PROJECT_NAME}-api
    image: ${PROJECT_NAME}-backend:latest
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - ./backend:/app
      - ./supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:rw
    depends_on:
      - backend-postgres
    command: bash docker-entrypoint.sh
    environment:
      - DEBUG=${DEBUG}
      - WAIT_HOSTS=${DB_HOST}:${DB_PORT}
      - WAIT_HOSTS_TIMEOUT=300
      - WAIT_SLEEP_INTERVAL=15
      - WAIT_HOST_CONNECT_TIMEOUT=20
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_USER_PASSWORD=${DB_USER_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - SOCIAL_GOOGLE_CLIENT_ID=${SOCIAL_GOOGLE_CLIENT_ID}
      - SOCIAL_GOOGLE_CLIENT_SECRET=${SOCIAL_GOOGLE_CLIENT_SECRET}
      - SOCIAL_MICROSOFT_CLIENT_ID=${SOCIAL_MICROSOFT_CLIENT_ID}
      - SOCIAL_MICROSOFT_CLIENT_SECRET=${SOCIAL_MICROSOFT_CLIENT_SECRET}
      - QUICK_API_USERNAME=${QUICK_API_USERNAME}
      - QUICK_API_PASSWORD=${QUICK_API_PASSWORD}

  backend-nginx:
    <<: [ *restart, *networks ]
    container_name: ${PROJECT_NAME}-nginx
    image: nginx:latest
    hostname: ${PROJECT_NAME}-nginx
    ports:
      - "${PROJECT_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/src # 若前端爲build過的靜態檔案，則直接導入頁面位置
    extra_hosts: # 若前端頁面爲前端自己建立的server則必須設定這項去讓nginx可以接同一臺機器的其他port
      - "host.docker.internal:host-gateway"

networks:
  net:
    name: ${PROJECT_NAME}-net
    driver: bridge

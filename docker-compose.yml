x-common-networks: &networks
  networks:
    - net

x-common-restart: &restart
  restart: always

x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-env: &env-file
  env_file:
    - ./.env

services:

  frontend:
    <<: [ *restart, *networks ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-frontend
    depends_on:
      - backend-api

  backend-redis:
    <<: [ *restart, *networks ]
    image: redis
    container_name: ${PROJECT_NAME}-redis
    hostname: ${PROJECT_NAME}-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m

  backend-api:
    <<: [ *restart, *networks, *env-file ]
    container_name: ${PROJECT_NAME}-api
    hostname: ${PROJECT_NAME}-api
    image: ${PROJECT_NAME}-backend:latest
    build:
      context: ./backend
      dockerfile: ./Dockerfile
    volumes:
      - ./backend:/app
    command: bash docker-entrypoint.sh
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    environment:
      - DEBUG=${DEBUG}
      - SECRET_KEY=${SECRET_KEY:-secret-key}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID:-}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET:-}
      - MICROSOFT_TENANT=${MICROSOFT_TENANT:-common}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-}

  backend-nginx:
    <<: [ *restart, *networks, *extra-hosts ]
    container_name: ${PROJECT_NAME}-nginx
    image: nginx:1.27-alpine
    hostname: ${PROJECT_NAME}-nginx
    depends_on:
      frontend:
        condition: service_started
      backend-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    mem_limit: 256m
    ports:
      - "${PROJECT_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/src

networks:
  net:
    name: ${PROJECT_NAME}-net
    driver: bridge


x-common-networks:
  &networks
  networks:
    - net

x-common-restart:
  &restart
  restart: always

x-extra-hosts:
  &extra-hosts
  extra_hosts: # 若前端頁面爲前端自己建立的server則必須設定這項去讓nginx可以接同一臺機器的其他port
    - "host.docker.internal:host-gateway"

x-env:
  &env-file
  env_file: 
    - ./.env

services:

  frontend:
    <<: [ *restart, *networks ]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${PROJECT_NAME}-frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend-api:8000
    depends_on:
      - backend-api

  backend-redis:
    <<: [ *restart, *networks ]
    image: redis
    container_name: ${PROJECT_NAME}-redis
    hostname: ${PROJECT_NAME}-redis

  backend-api:
    <<: [ *restart, *networks ]
    container_name: ${PROJECT_NAME}-api
    hostname: ${PROJECT_NAME}-api
    image: ${PROJECT_NAME}-backend:latest
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - ./backend:/app
      - ./supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:rw
    command: bash docker-entrypoint.sh
    environment:
      - DEBUG=${DEBUG}
      - SOCIAL_GOOGLE_CLIENT_ID=${SOCIAL_GOOGLE_CLIENT_ID}
      - SOCIAL_GOOGLE_CLIENT_SECRET=${SOCIAL_GOOGLE_CLIENT_SECRET}
      - SOCIAL_MICROSOFT_CLIENT_ID=${SOCIAL_MICROSOFT_CLIENT_ID}
      - SOCIAL_MICROSOFT_CLIENT_SECRET=${SOCIAL_MICROSOFT_CLIENT_SECRET}
      - ELASTICSEARCH_HOST=${ELASTICSEARCH_HOST}
      - ELASTICSEARCH_PORT=${ELASTICSEARCH_PORT}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD}
      - ES_INDEX_PREDICTION=${ES_INDEX_PREDICTION:-prediction}
      - ES_INDEX_JEPX=${ES_INDEX_JEPX:-jepx_spot_nightly}
      - ES_INDEX_IMBALANCE=${ES_INDEX_IMBALANCE:-imbalance}
      - ES_INDEX_HJKS=${ES_INDEX_HJKS:-hjks}
      - ES_INDEX_INTERCONNECTION=${ES_INDEX_INTERCONNECTION:-interconnection}
      - ES_INDEX_INTRADAY=${ES_INDEX_INTRADAY:-jepx_intraday}
      - ES_INDEX_EARTHQUAKE=${ES_INDEX_EARTHQUAKE:-jma_earthquake_actual}
      - ES_INDEX_OCCTO_AREA=${ES_INDEX_OCCTO_AREA:-occto_area}
      - ES_INDEX_OCCTO_INTER=${ES_INDEX_OCCTO_INTER:-occto_inter}
      - ES_INDEX_OCCTO_EVENT=${ES_INDEX_OCCTO_EVENT:-occto_event}
      - ES_INDEX_TDGC=${ES_INDEX_TDGC:-tdgc}
      - ES_INDEX_WEATHER_ACTUAL=${ES_INDEX_WEATHER_ACTUAL:-weather_actual}
      - ES_INDEX_WEATHER_FORECAST=${ES_INDEX_WEATHER_FORECAST:-weather_forecast}

  backend-nginx:
    <<: [ *restart, *networks ]
    container_name: ${PROJECT_NAME}-nginx
    image: nginx:latest
    hostname: ${PROJECT_NAME}-nginx
    ports:
      - "${PROJECT_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/src # 若前端爲build過的靜態檔案，則直接導入頁面位置
    extra_hosts: # 若前端頁面爲前端自己建立的server則必須設定這項去讓nginx可以接同一臺機器的其他port
      - "host.docker.internal:host-gateway"

networks:
  net:
    name: ${PROJECT_NAME}-net
    driver: bridge
